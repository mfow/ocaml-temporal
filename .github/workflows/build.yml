name: Build

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  license-audit:
    name: Dependency license audit
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
      - name: Audit dependency licenses
        run: make license-check OCAML_VERSION=5.2

  verify:
    name: OCaml ${{ matrix.ocaml }} / ${{ matrix.runner }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        ocaml:
          - "5.2"
          - "5.3"
          - "5.4"
          - "5.5"
        runner:
          - ubuntu-24.04
          - ubuntu-24.04-arm
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
      - name: Build, lint, and test
        run: make verify OCAML_VERSION=${{ matrix.ocaml }}
