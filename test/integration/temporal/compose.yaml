services:
  dev:
    build:
      # The fixture lives below the repository root, but the development image
      # and source bind mount deliberately retain the whole-project context.
      context: ../../..
      dockerfile: Dockerfile.dev
      args:
        OCAML_IMAGE: ${OCAML_IMAGE:-ocaml/opam:debian-12-ocaml-5.2}
    working_dir: /workspace
    volumes:
      - ../../..:/workspace
    init: true
    networks:
      - temporal-network

  postgresql:
    profiles: [temporal]
    image: postgres:16.13-bookworm@sha256:472efd9a66f2b2f1a5aeb18b28de74332e6ef88c2b93a1a5d812fb6db67a5f60
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
    expose:
      - "5432"
    volumes:
      - temporal-postgres-data:/var/lib/postgresql/data
    networks:
      - temporal-network
    healthcheck:
      test: [CMD-SHELL, "pg_isready -U temporal -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 60
      start_period: 20s
    stop_grace_period: 30s

  temporal-schema:
    profiles: [temporal]
    image: temporalio/admin-tools:1.31.0@sha256:3e68adcd54195a7c1222e99f2dbc32a4fdbf44ad69e3bb48e21e85c4bf417c2e
    depends_on:
      postgresql:
        condition: service_healthy
    environment:
      DB_PORT: "5432"
      POSTGRES_SEEDS: postgresql
      POSTGRES_USER: temporal
      POSTGRES_PWD: temporal
      SQL_PASSWORD: temporal
    volumes:
      - ./scripts/setup-temporal-postgres.sh:/scripts/setup-temporal-postgres.sh:ro
    networks:
      - temporal-network
    entrypoint: [/bin/sh, /scripts/setup-temporal-postgres.sh]
    # A fresh PostgreSQL container can report healthy before its first DDL
    # transaction is accepted. Restart the one-shot initializer a few times;
    # the script remains bounded and fail-closed for real migration errors.
    restart: on-failure:5

  temporal:
    profiles: [temporal]
    image: temporalio/server:1.31.0@sha256:b021b3b58c3f169634cdbb0451fcc0e69e8190b40454323362c7c52bbd4ff7b9
    depends_on:
      temporal-schema:
        condition: service_completed_successfully
    environment:
      DB: postgres12
      DB_PORT: "5432"
      POSTGRES_SEEDS: postgresql
      POSTGRES_USER: temporal
      POSTGRES_PWD: temporal
      SQL_PASSWORD: temporal
      BIND_ON_IP: 0.0.0.0
      # Use the mounted absolute path so the server cannot resolve the
      # dynamic-config file relative to an image-specific working directory.
      DYNAMIC_CONFIG_FILE_PATH: /etc/temporal/config/dynamicconfig/development-sql.yaml
    ports:
      - "${TEMPORAL_FRONTEND_PORT:-7233}:7233"
    volumes:
      - ./config/development-sql.yaml:/etc/temporal/config/dynamicconfig/development-sql.yaml:ro
    networks:
      - temporal-network
    healthcheck:
      test: [CMD-SHELL, "nc -z localhost 7233"]
      interval: 5s
      timeout: 3s
      retries: 60
      start_period: 30s
    restart: on-failure:5
    stop_grace_period: 30s

  temporal-admin-tools:
    profiles: [temporal]
    image: temporalio/admin-tools:1.31.0@sha256:3e68adcd54195a7c1222e99f2dbc32a4fdbf44ad69e3bb48e21e85c4bf417c2e
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_NAMESPACE: temporal-sdk-test
    volumes:
      - ./scripts/check-temporal-stack.sh:/scripts/check-temporal-stack.sh:ro
    networks:
      - temporal-network

  # The acceptance worker is a separate OCaml process from the driver. Both
  # services extend the same development image so they exercise the exact
  # public package and Rust bridge that a checked-out application would build.
  smoke-worker:
    profiles: [temporal]
    extends:
      service: dev
    # The source tree and Dune build directory are shared with the preceding
    # Compose build step. Running both processes as the same host UID prevents
    # the default image user from opening a lock created by that step.
    # The worker gets its own Dune build directory so its long-lived `dune exec`
    # lock cannot block the separately launched driver.
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    depends_on:
      temporal:
        condition: service_healthy
    environment:
      TEMPORAL_TWO_BINARY_LIVE: "1"
      TEMPORAL_ADDRESS: http://temporal:7233
      TEMPORAL_NAMESPACE: temporal-sdk-test
      SMOKE_WORKER_READY_FILE: /tmp/ocaml-temporal-two-binary-worker.ready
      SMOKE_WORKER_STOPPED_FILE: /workspace/test/integration/temporal/.worker-stopped
      SMOKE_CANCELLATION_READY_FILE: /workspace/test/integration/temporal/.cancellation-ready
      SMOKE_SIGNAL_CONDITION_READY_FILE: /workspace/test/integration/temporal/.signal-condition-ready
      SMOKE_WORKER_REPLAY_DIAGNOSTICS_FILE: /workspace/test/integration/temporal/.restart-replay-diagnostics.json
      SMOKE_WORKER_GENERATION: "${SMOKE_WORKER_GENERATION:-1}"
      SMOKE_WORKER_MAX_CACHED_WORKFLOWS: "${SMOKE_WORKER_MAX_CACHED_WORKFLOWS:-}"
      SMOKE_WORKER_CACHE_EVICTION_FILE: "${SMOKE_WORKER_CACHE_EVICTION_FILE:-}"
      SMOKE_WORKER_CACHE_EVICTION_READY_FILE: "${SMOKE_WORKER_CACHE_EVICTION_READY_FILE:-}"
      SMOKE_WORKER_CACHE_EVICTION_SECOND_READY_FILE: "${SMOKE_WORKER_CACHE_EVICTION_SECOND_READY_FILE:-}"
      SMOKE_CACHE_EVICTION_SECOND_WORKFLOW_ID: "${SMOKE_CACHE_EVICTION_SECOND_WORKFLOW_ID:-}"
      SMOKE_REPLAY_WORKFLOW_ID: "${SMOKE_REPLAY_WORKFLOW_ID:-two-binary-worker-restart-replay}"
    command:
      - opam
      - exec
      - --
      - dune
      - exec
      - --build-dir=/workspace/_build/smoke-worker
      - test/integration/temporal/worker/smoke_worker.exe
    healthcheck:
      test: [CMD-SHELL, "test -s /tmp/ocaml-temporal-two-binary-worker.ready"]
      interval: 2s
      timeout: 2s
      # The first worker start compiles the pinned Rust/Core graph in the
      # bind-mounted build directory. On an ARM64 Docker VM that cold link can
      # take several minutes, so the health budget must cover compilation as
      # well as the short startup after the executable is ready. A failed
      # health check never claims readiness: the Makefile still requires the
      # marker written after Worker.create succeeds.
      retries: 300
      start_period: 60s
    # The executable converts SIGTERM into Worker.shutdown and needs enough
    # time for Core to release any in-flight workflow/activity lease.
    stop_grace_period: 30s
    init: true

  # Cache eviction has its own worker so the one-entry Core cache contains no
  # executions from the broad smoke suite.  The same private diagnostic paths
  # are used by the existing native callback, but only this process can publish
  # the cache-full marker for the two runs under test.
  smoke-cache-eviction-worker:
    profiles: [temporal]
    extends:
      service: dev
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    depends_on:
      temporal:
        condition: service_healthy
    environment:
      TEMPORAL_TWO_BINARY_LIVE: "1"
      TEMPORAL_ADDRESS: http://temporal:7233
      TEMPORAL_NAMESPACE: temporal-sdk-test
      SMOKE_CACHE_EVICTION_READY_FILE: /tmp/ocaml-temporal-cache-eviction-worker.ready
      SMOKE_WORKER_REPLAY_DIAGNOSTICS_FILE: /workspace/test/integration/temporal/.restart-replay-diagnostics.json
      SMOKE_WORKER_GENERATION: "1"
      SMOKE_WORKER_MAX_CACHED_WORKFLOWS: "1"
      SMOKE_WORKER_CACHE_EVICTION_FILE: /workspace/test/integration/temporal/.cache-eviction.json
      SMOKE_WORKER_CACHE_EVICTION_READY_FILE: /workspace/test/integration/temporal/.cache-eviction-ready
      SMOKE_WORKER_CACHE_EVICTION_SECOND_READY_FILE: /workspace/test/integration/temporal/.cache-eviction-second-ready
      SMOKE_CACHE_EVICTION_SECOND_WORKFLOW_ID: two-binary-cache-eviction-b
      SMOKE_REPLAY_WORKFLOW_ID: two-binary-cache-eviction-a
    command:
      - opam
      - exec
      - --
      - dune
      - exec
      - --build-dir=/workspace/_build/smoke-cache-eviction-worker
      - test/integration/temporal/worker/cache_eviction_worker.exe
    healthcheck:
      test: [CMD-SHELL, "test -s /tmp/ocaml-temporal-cache-eviction-worker.ready"]
      interval: 2s
      timeout: 2s
      retries: 300
      start_period: 60s
    stop_grace_period: 30s
    init: true

  # The driver is run with `docker compose run` by the Makefile after the
  # worker health check succeeds. Keeping it as a service still gives Compose
  # one normalized model to validate and makes the two-process topology clear.
  smoke-driver:
    profiles: [temporal]
    extends:
      service: dev
    # Keep the driver on the same bind-mounted build ownership as the worker;
    # this also makes repeated local runs independent of the image's opam UID.
    # Its private Dune build directory is required because the worker remains
    # alive while this process is built and executed.
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    depends_on:
      smoke-worker:
        condition: service_healthy
    environment:
      TEMPORAL_TWO_BINARY_LIVE: "1"
      TEMPORAL_ADDRESS: http://temporal:7233
      TEMPORAL_NAMESPACE: temporal-sdk-test
      SMOKE_DRIVER_TIMEOUT_SECONDS: "${SMOKE_DRIVER_TIMEOUT_SECONDS:-300}"
      SMOKE_CANCELLATION_READY_FILE: /workspace/test/integration/temporal/.cancellation-ready
      SMOKE_SIGNAL_CONDITION_READY_FILE: /workspace/test/integration/temporal/.signal-condition-ready
    command:
      - timeout
      - --signal=TERM
      - --kill-after=10s
      - "${SMOKE_DRIVER_TIMEOUT_SECONDS:-300}"
      - opam
      - exec
      - --
      - dune
      - exec
      - --build-dir=/workspace/_build/smoke-driver
      - test/integration/temporal/driver/smoke_driver.exe
    init: true

  # The restart controller starts this second OCaml client process in the
  # background. It deliberately waits on one exact run while the host-side
  # Make target stops and replaces the worker container. Keeping it separate
  # from the ordinary twelve-scenario driver makes the lifecycle assertions
  # independently observable and avoids changing the fast smoke gate.
  smoke-restart-driver:
    profiles: [temporal]
    extends:
      service: dev
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    depends_on:
      smoke-worker:
        condition: service_healthy
    environment:
      TEMPORAL_TWO_BINARY_LIVE: "1"
      TEMPORAL_ADDRESS: http://temporal:7233
      TEMPORAL_NAMESPACE: temporal-sdk-test
      SMOKE_RESTART_ACCEPTED_FILE: /workspace/test/integration/temporal/.restart-replay-accepted
      SMOKE_RESTART_RESULT_FILE: /workspace/test/integration/temporal/.restart-replay-result
    command:
      - timeout
      - --signal=TERM
      - --kill-after=10s
      - "${SMOKE_DRIVER_TIMEOUT_SECONDS:-300}"
      - opam
      - exec
      - --
      - dune
      - exec
      - --build-dir=/workspace/_build/smoke-restart-driver
      - test/integration/temporal/driver/restart_driver.exe
    init: true

  # The cache-eviction driver deliberately remains a client-only process. The
  # worker's one-slot Core configuration and its payload-free marker are what
  # make the RemoveFromCache acknowledgement observable at the public boundary.
  smoke-cache-eviction-driver:
    profiles: [temporal]
    extends:
      service: dev
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    depends_on:
      smoke-cache-eviction-worker:
        condition: service_healthy
    environment:
      TEMPORAL_TWO_BINARY_LIVE: "1"
      TEMPORAL_ADDRESS: http://temporal:7233
      TEMPORAL_NAMESPACE: temporal-sdk-test
      SMOKE_DRIVER_TIMEOUT_SECONDS: "${SMOKE_DRIVER_TIMEOUT_SECONDS:-300}"
      SMOKE_CACHE_EVICTION_TIMEOUT_SECONDS: "${SMOKE_CACHE_EVICTION_TIMEOUT_SECONDS:-900}"
      SMOKE_CACHE_EVICTION_FILE: /workspace/test/integration/temporal/.cache-eviction.json
      SMOKE_CACHE_EVICTION_READY_FILE: /workspace/test/integration/temporal/.cache-eviction-ready
      SMOKE_CACHE_EVICTION_SECOND_READY_FILE: /workspace/test/integration/temporal/.cache-eviction-second-ready
      SMOKE_REPLAY_DIAGNOSTICS_FILE: /workspace/test/integration/temporal/.restart-replay-diagnostics.json
    command:
      - timeout
      - --signal=TERM
      - --kill-after=10s
      - "${SMOKE_CACHE_EVICTION_TIMEOUT_SECONDS:-900}"
      - opam
      - exec
      - --
      - dune
      - exec
      - --build-dir=/workspace/_build/smoke-cache-eviction-driver
      - test/integration/temporal/driver/cache_eviction_driver.exe
    init: true

  # The patch-replay gate deliberately builds the pre-patch and patched
  # workflow sources into different executables. Starting a legacy process and
  # later replacing it with this second binary is what makes the old-history
  # replay evidence representative of a real code deployment.
  patch-replay-legacy-worker:
    profiles: [temporal]
    extends:
      service: dev
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    depends_on:
      temporal:
        condition: service_healthy
    environment:
      TEMPORAL_TWO_BINARY_LIVE: "1"
      TEMPORAL_ADDRESS: http://temporal:7233
      TEMPORAL_NAMESPACE: temporal-sdk-test
      PATCH_REPLAY_WORKER_READY_FILE: /tmp/ocaml-temporal-patch-replay.ready
      PATCH_REPLAY_WORKER_STOPPED_FILE: "${PATCH_REPLAY_WORKER_STOPPED_FILE:-/workspace/test/integration/temporal/.patch-replay-worker-stopped}"
      SMOKE_WORKER_REPLAY_DIAGNOSTICS_FILE: "${PATCH_REPLAY_DIAGNOSTICS_FILE:-/workspace/test/integration/temporal/.patch-replay-legacy-diagnostics.json}"
      SMOKE_WORKER_GENERATION: "${PATCH_REPLAY_GENERATION:-1}"
      SMOKE_REPLAY_WORKFLOW_ID: "${PATCH_REPLAY_WORKFLOW_ID:-two-binary-patch-replay-legacy}"
    command:
      - opam
      - exec
      - --
      - dune
      - exec
      - --build-dir=/workspace/_build/patch-replay-legacy-worker
      - test/integration/temporal/patch_replay/legacy_worker.exe
    healthcheck:
      test: [CMD-SHELL, "test -s /tmp/ocaml-temporal-patch-replay.ready"]
      interval: 2s
      timeout: 2s
      retries: 300
      start_period: 60s
    stop_grace_period: 30s
    init: true

  patch-replay-patched-worker:
    profiles: [temporal]
    extends:
      service: dev
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    depends_on:
      temporal:
        condition: service_healthy
    environment:
      TEMPORAL_TWO_BINARY_LIVE: "1"
      TEMPORAL_ADDRESS: http://temporal:7233
      TEMPORAL_NAMESPACE: temporal-sdk-test
      PATCH_REPLAY_WORKER_READY_FILE: /tmp/ocaml-temporal-patch-replay.ready
      PATCH_REPLAY_WORKER_STOPPED_FILE: "${PATCH_REPLAY_WORKER_STOPPED_FILE:-/workspace/test/integration/temporal/.patch-replay-worker-stopped}"
      SMOKE_WORKER_REPLAY_DIAGNOSTICS_FILE: "${PATCH_REPLAY_DIAGNOSTICS_FILE:-/workspace/test/integration/temporal/.patch-replay-legacy-diagnostics.json}"
      SMOKE_WORKER_GENERATION: "${PATCH_REPLAY_GENERATION:-2}"
      SMOKE_REPLAY_WORKFLOW_ID: "${PATCH_REPLAY_WORKFLOW_ID:-two-binary-patch-replay-legacy}"
    command:
      - opam
      - exec
      - --
      - dune
      - exec
      - --build-dir=/workspace/_build/patch-replay-patched-worker
      - test/integration/temporal/patch_replay/patched_worker.exe
    healthcheck:
      test: [CMD-SHELL, "test -s /tmp/ocaml-temporal-patch-replay.ready"]
      interval: 2s
      timeout: 2s
      retries: 300
      start_period: 60s
    stop_grace_period: 30s
    init: true

  # This source generation makes the patched behavior unconditional while
  # retaining the lifecycle marker through the public deprecation API.
  patch-replay-deprecated-worker:
    profiles: [temporal]
    extends:
      service: patch-replay-patched-worker
    command:
      - opam
      - exec
      - --
      - dune
      - exec
      - --build-dir=/workspace/_build/patch-replay-deprecated-worker
      - test/integration/temporal/patch_replay/deprecated_worker.exe

  # This final source generation contains no patch API. It is started only
  # after a deprecated marker has been written by the preceding executable.
  patch-replay-removed-worker:
    profiles: [temporal]
    extends:
      service: patch-replay-patched-worker
    command:
      - opam
      - exec
      - --
      - dune
      - exec
      - --build-dir=/workspace/_build/patch-replay-removed-worker
      - test/integration/temporal/patch_replay/removed_worker.exe

  # This client-only OCaml executable starts an exact run and waits for its
  # typed result. The host controller changes only IDs and expected results;
  # it never selects the workflow implementation used by either worker.
  patch-replay-driver:
    profiles: [temporal]
    extends:
      service: dev
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    depends_on:
      temporal:
        condition: service_healthy
    environment:
      TEMPORAL_TWO_BINARY_LIVE: "1"
      TEMPORAL_ADDRESS: http://temporal:7233
      TEMPORAL_NAMESPACE: temporal-sdk-test
      PATCH_REPLAY_EXECUTION_ID: "${PATCH_REPLAY_EXECUTION_ID:-two-binary-patch-replay-legacy}"
      PATCH_REPLAY_EXPECTED_RESULT: "${PATCH_REPLAY_EXPECTED_RESULT:-PATCH_REPLAY:OLD_HISTORY}"
      PATCH_REPLAY_ACCEPTED_FILE: "${PATCH_REPLAY_ACCEPTED_FILE:-/workspace/test/integration/temporal/.patch-replay-accepted}"
      PATCH_REPLAY_RESULT_FILE: "${PATCH_REPLAY_RESULT_FILE:-/workspace/test/integration/temporal/.patch-replay-result}"
    command:
      - timeout
      - --signal=TERM
      - --kill-after=10s
      - "${SMOKE_DRIVER_TIMEOUT_SECONDS:-300}"
      - opam
      - exec
      - --
      - dune
      - exec
      - --build-dir=/workspace/_build/patch-replay-driver
      - test/integration/temporal/patch_replay/patch_replay_driver.exe
    init: true

  # These two services execute the same dedicated OCaml worker binary but use
  # separate containers. They share one Dune directory only after generation
  # one has stopped and been removed, avoiding a redundant native rebuild
  # without allowing two Dune owners to overlap. Generation one learns the exact
  # parent and child run IDs from their initial activations; generation two is
  # pinned to those IDs and can therefore reject an unrelated replay.
  parent-child-restart-worker-one:
    profiles: [temporal]
    extends:
      service: dev
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    depends_on:
      temporal:
        condition: service_healthy
    environment:
      TEMPORAL_TWO_BINARY_LIVE: "1"
      TEMPORAL_ADDRESS: http://temporal:7233
      TEMPORAL_NAMESPACE: temporal-sdk-test
      SMOKE_WORKER_READY_FILE: /tmp/ocaml-temporal-parent-child-restart.ready
      SMOKE_WORKER_STOPPED_FILE: /workspace/test/integration/temporal/.parent-child-restart-worker-one-stopped
      SMOKE_PARENT_CHILD_REPLAY_DIAGNOSTICS_FILE: "${SMOKE_PARENT_CHILD_REPLAY_DIAGNOSTICS_FILE:-/workspace/test/integration/temporal/.parent-child-restart-diagnostics.json}"
      SMOKE_PARENT_CHILD_REPLAY_GENERATION: "${SMOKE_PARENT_CHILD_REPLAY_GENERATION:-1}"
      SMOKE_PARENT_CHILD_REPLAY_PARENT_WORKFLOW_ID: "${SMOKE_PARENT_CHILD_REPLAY_PARENT_WORKFLOW_ID:-two-binary-parent-child-restart}"
      SMOKE_PARENT_CHILD_REPLAY_CHILD_WORKFLOW_ID: "${SMOKE_PARENT_CHILD_REPLAY_CHILD_WORKFLOW_ID:-two-binary-parent-child-restart-child-smoke}"
      SMOKE_PARENT_CHILD_REPLAY_SCENARIO: "${SMOKE_PARENT_CHILD_REPLAY_SCENARIO:-success}"
    command:
      - opam
      - exec
      - --
      - dune
      - exec
      - --build-dir=/workspace/_build/parent-child-restart-worker
      - test/integration/temporal/worker/parent_child_restart_worker.exe
    healthcheck:
      test: [CMD-SHELL, "test -s /tmp/ocaml-temporal-parent-child-restart.ready"]
      interval: 2s
      timeout: 2s
      retries: 300
      start_period: 60s
    stop_grace_period: 45s
    init: true

  parent-child-restart-worker-two:
    profiles: [temporal]
    extends:
      service: dev
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    depends_on:
      temporal:
        condition: service_healthy
    environment:
      TEMPORAL_TWO_BINARY_LIVE: "1"
      TEMPORAL_ADDRESS: http://temporal:7233
      TEMPORAL_NAMESPACE: temporal-sdk-test
      SMOKE_WORKER_READY_FILE: /tmp/ocaml-temporal-parent-child-restart.ready
      SMOKE_WORKER_STOPPED_FILE: /workspace/test/integration/temporal/.parent-child-restart-worker-two-stopped
      SMOKE_PARENT_CHILD_REPLAY_DIAGNOSTICS_FILE: "${SMOKE_PARENT_CHILD_REPLAY_DIAGNOSTICS_FILE:-/workspace/test/integration/temporal/.parent-child-restart-diagnostics.json}"
      SMOKE_PARENT_CHILD_REPLAY_GENERATION: "${SMOKE_PARENT_CHILD_REPLAY_GENERATION:-2}"
      SMOKE_PARENT_CHILD_REPLAY_PARENT_WORKFLOW_ID: "${SMOKE_PARENT_CHILD_REPLAY_PARENT_WORKFLOW_ID:-two-binary-parent-child-restart}"
      SMOKE_PARENT_CHILD_REPLAY_PARENT_RUN_ID: "${SMOKE_PARENT_CHILD_REPLAY_PARENT_RUN_ID:-not-configured}"
      SMOKE_PARENT_CHILD_REPLAY_CHILD_WORKFLOW_ID: "${SMOKE_PARENT_CHILD_REPLAY_CHILD_WORKFLOW_ID:-two-binary-parent-child-restart-child-smoke}"
      SMOKE_PARENT_CHILD_REPLAY_CHILD_RUN_ID: "${SMOKE_PARENT_CHILD_REPLAY_CHILD_RUN_ID:-not-configured}"
      SMOKE_PARENT_CHILD_REPLAY_SCENARIO: "${SMOKE_PARENT_CHILD_REPLAY_SCENARIO:-success}"
    command:
      - opam
      - exec
      - --
      - dune
      - exec
      - --build-dir=/workspace/_build/parent-child-restart-worker
      - test/integration/temporal/worker/parent_child_restart_worker.exe
    healthcheck:
      test: [CMD-SHELL, "test -s /tmp/ocaml-temporal-parent-child-restart.ready"]
      interval: 2s
      timeout: 2s
      retries: 300
      start_period: 60s
    stop_grace_period: 45s
    init: true

  # The client process starts only the parent and remains attached to that
  # exact run while the host controller replaces the worker generation.
  parent-child-restart-driver:
    profiles: [temporal]
    extends:
      service: dev
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    depends_on:
      temporal:
        condition: service_healthy
    environment:
      TEMPORAL_TWO_BINARY_LIVE: "1"
      TEMPORAL_ADDRESS: http://temporal:7233
      TEMPORAL_NAMESPACE: temporal-sdk-test
      SMOKE_PARENT_CHILD_REPLAY_SCENARIO: "${SMOKE_PARENT_CHILD_REPLAY_SCENARIO:-success}"
      SMOKE_PARENT_CHILD_RESTART_ACCEPTED_FILE: "${SMOKE_PARENT_CHILD_RESTART_ACCEPTED_FILE:-/workspace/test/integration/temporal/.parent-child-restart-accepted}"
      SMOKE_PARENT_CHILD_RESTART_RESULT_FILE: "${SMOKE_PARENT_CHILD_RESTART_RESULT_FILE:-/workspace/test/integration/temporal/.parent-child-restart-result}"
    command:
      - timeout
      - --signal=TERM
      - --kill-after=10s
      - "${SMOKE_PARENT_CHILD_RESTART_TIMEOUT_SECONDS:-900}"
      - opam
      - exec
      - --
      - dune
      - exec
      - --build-dir=/workspace/_build/parent-child-restart-driver
      - test/integration/temporal/driver/parent_child_restart_driver.exe
    init: true

networks:
  temporal-network:
    driver: bridge

volumes:
  temporal-postgres-data:
