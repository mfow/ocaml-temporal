services:
  dev:
    build:
      # The fixture lives below the repository root, but the development image
      # and source bind mount deliberately retain the whole-project context.
      context: ../../..
      dockerfile: Dockerfile.dev
      args:
        OCAML_IMAGE: ${OCAML_IMAGE:-ocaml/opam:debian-12-ocaml-5.2}
    working_dir: /workspace
    volumes:
      - ../../..:/workspace
    init: true
    networks:
      - temporal-network

  postgresql:
    profiles: [temporal]
    image: postgres:16.13-bookworm@sha256:472efd9a66f2b2f1a5aeb18b28de74332e6ef88c2b93a1a5d812fb6db67a5f60
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
    expose:
      - "5432"
    volumes:
      - temporal-postgres-data:/var/lib/postgresql/data
    networks:
      - temporal-network
    healthcheck:
      test: [CMD-SHELL, "pg_isready -U temporal -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 60
      start_period: 20s
    stop_grace_period: 30s

  temporal-schema:
    profiles: [temporal]
    image: temporalio/admin-tools:1.31.0@sha256:3e68adcd54195a7c1222e99f2dbc32a4fdbf44ad69e3bb48e21e85c4bf417c2e
    depends_on:
      postgresql:
        condition: service_healthy
    environment:
      DB_PORT: "5432"
      POSTGRES_SEEDS: postgresql
      POSTGRES_USER: temporal
      POSTGRES_PWD: temporal
      SQL_PASSWORD: temporal
    volumes:
      - ./scripts/setup-temporal-postgres.sh:/scripts/setup-temporal-postgres.sh:ro
    networks:
      - temporal-network
    entrypoint: [/bin/sh, /scripts/setup-temporal-postgres.sh]
    restart: "no"

  temporal:
    profiles: [temporal]
    image: temporalio/server:1.31.0@sha256:b021b3b58c3f169634cdbb0451fcc0e69e8190b40454323362c7c52bbd4ff7b9
    depends_on:
      temporal-schema:
        condition: service_completed_successfully
    environment:
      DB: postgres12
      DB_PORT: "5432"
      POSTGRES_SEEDS: postgresql
      POSTGRES_USER: temporal
      POSTGRES_PWD: temporal
      SQL_PASSWORD: temporal
      BIND_ON_IP: 0.0.0.0
      DYNAMIC_CONFIG_FILE_PATH: config/dynamicconfig/development-sql.yaml
    ports:
      - "${TEMPORAL_FRONTEND_PORT:-7233}:7233"
    volumes:
      - ./config/development-sql.yaml:/etc/temporal/config/dynamicconfig/development-sql.yaml:ro
    networks:
      - temporal-network
    healthcheck:
      test: [CMD-SHELL, "nc -z localhost 7233"]
      interval: 5s
      timeout: 3s
      retries: 60
      start_period: 30s
    restart: on-failure:5
    stop_grace_period: 30s

  temporal-admin-tools:
    profiles: [temporal]
    image: temporalio/admin-tools:1.31.0@sha256:3e68adcd54195a7c1222e99f2dbc32a4fdbf44ad69e3bb48e21e85c4bf417c2e
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_NAMESPACE: temporal-sdk-test
    volumes:
      - ./scripts/check-temporal-stack.sh:/scripts/check-temporal-stack.sh:ro
    networks:
      - temporal-network

  # The acceptance worker is a separate OCaml process from the driver. Both
  # services extend the same development image so they exercise the exact
  # public package and Rust bridge that a checked-out application would build.
  smoke-worker:
    profiles: [temporal]
    extends:
      service: dev
    # The source tree and Dune build directory are shared with the preceding
    # Compose build step. Running both processes as the same host UID prevents
    # the default image user from opening a lock created by that step.
    # The worker gets its own Dune build directory so its long-lived `dune exec`
    # lock cannot block the separately launched driver.
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    depends_on:
      temporal:
        condition: service_healthy
    environment:
      TEMPORAL_TWO_BINARY_LIVE: "1"
      TEMPORAL_ADDRESS: http://temporal:7233
      TEMPORAL_NAMESPACE: temporal-sdk-test
      SMOKE_WORKER_READY_FILE: /tmp/ocaml-temporal-two-binary-worker.ready
      SMOKE_WORKER_STOPPED_FILE: /workspace/test/integration/temporal/.worker-stopped
      SMOKE_CANCELLATION_READY_FILE: /workspace/test/integration/temporal/.cancellation-ready
      SMOKE_SIGNAL_CONDITION_READY_FILE: /workspace/test/integration/temporal/.signal-condition-ready
      SMOKE_WORKER_REPLAY_DIAGNOSTICS_FILE: /workspace/test/integration/temporal/.restart-replay-diagnostics.json
      SMOKE_WORKER_GENERATION: "${SMOKE_WORKER_GENERATION:-1}"
      SMOKE_WORKER_MAX_CACHED_WORKFLOWS: "${SMOKE_WORKER_MAX_CACHED_WORKFLOWS:-}"
      SMOKE_WORKER_CACHE_EVICTION_FILE: "${SMOKE_WORKER_CACHE_EVICTION_FILE:-}"
      SMOKE_WORKER_CACHE_EVICTION_READY_FILE: "${SMOKE_WORKER_CACHE_EVICTION_READY_FILE:-}"
      SMOKE_WORKER_CACHE_EVICTION_SECOND_READY_FILE: "${SMOKE_WORKER_CACHE_EVICTION_SECOND_READY_FILE:-}"
      SMOKE_CACHE_EVICTION_SECOND_WORKFLOW_ID: "${SMOKE_CACHE_EVICTION_SECOND_WORKFLOW_ID:-}"
      SMOKE_REPLAY_WORKFLOW_ID: "${SMOKE_REPLAY_WORKFLOW_ID:-two-binary-worker-restart-replay}"
    command:
      - opam
      - exec
      - --
      - dune
      - exec
      - --build-dir=/workspace/_build/smoke-worker
      - test/integration/temporal/worker/smoke_worker.exe
    healthcheck:
      test: [CMD-SHELL, "test -s /tmp/ocaml-temporal-two-binary-worker.ready"]
      interval: 2s
      timeout: 2s
      # The first worker start compiles the pinned Rust/Core graph in the
      # bind-mounted build directory. On an ARM64 Docker VM that cold link can
      # take several minutes, so the health budget must cover compilation as
      # well as the short startup after the executable is ready. A failed
      # health check never claims readiness: the Makefile still requires the
      # marker written after Worker.create succeeds.
      retries: 300
      start_period: 60s
    # The executable converts SIGTERM into Worker.shutdown and needs enough
    # time for Core to release any in-flight workflow/activity lease.
    stop_grace_period: 30s
    init: true

  # The driver is run with `docker compose run` by the Makefile after the
  # worker health check succeeds. Keeping it as a service still gives Compose
  # one normalized model to validate and makes the two-process topology clear.
  smoke-driver:
    profiles: [temporal]
    extends:
      service: dev
    # Keep the driver on the same bind-mounted build ownership as the worker;
    # this also makes repeated local runs independent of the image's opam UID.
    # Its private Dune build directory is required because the worker remains
    # alive while this process is built and executed.
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    depends_on:
      smoke-worker:
        condition: service_healthy
    environment:
      TEMPORAL_TWO_BINARY_LIVE: "1"
      TEMPORAL_ADDRESS: http://temporal:7233
      TEMPORAL_NAMESPACE: temporal-sdk-test
      SMOKE_DRIVER_TIMEOUT_SECONDS: "${SMOKE_DRIVER_TIMEOUT_SECONDS:-300}"
      SMOKE_CANCELLATION_READY_FILE: /workspace/test/integration/temporal/.cancellation-ready
      SMOKE_SIGNAL_CONDITION_READY_FILE: /workspace/test/integration/temporal/.signal-condition-ready
    command:
      - timeout
      - --signal=TERM
      - --kill-after=10s
      - "${SMOKE_DRIVER_TIMEOUT_SECONDS:-300}"
      - opam
      - exec
      - --
      - dune
      - exec
      - --build-dir=/workspace/_build/smoke-driver
      - test/integration/temporal/driver/smoke_driver.exe
    init: true

  # The restart controller starts this second OCaml client process in the
  # background. It deliberately waits on one exact run while the host-side
  # Make target stops and replaces the worker container. Keeping it separate
  # from the ordinary twelve-scenario driver makes the lifecycle assertions
  # independently observable and avoids changing the fast smoke gate.
  smoke-restart-driver:
    profiles: [temporal]
    extends:
      service: dev
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    depends_on:
      smoke-worker:
        condition: service_healthy
    environment:
      TEMPORAL_TWO_BINARY_LIVE: "1"
      TEMPORAL_ADDRESS: http://temporal:7233
      TEMPORAL_NAMESPACE: temporal-sdk-test
      SMOKE_RESTART_ACCEPTED_FILE: /workspace/test/integration/temporal/.restart-replay-accepted
      SMOKE_RESTART_RESULT_FILE: /workspace/test/integration/temporal/.restart-replay-result
    command:
      - timeout
      - --signal=TERM
      - --kill-after=10s
      - "${SMOKE_DRIVER_TIMEOUT_SECONDS:-300}"
      - opam
      - exec
      - --
      - dune
      - exec
      - --build-dir=/workspace/_build/smoke-restart-driver
      - test/integration/temporal/driver/restart_driver.exe
    init: true

  # The cache-eviction driver deliberately remains a client-only process. The
  # worker's one-slot Core configuration and its payload-free marker are what
  # make the RemoveFromCache acknowledgement observable at the public boundary.
  smoke-cache-eviction-driver:
    profiles: [temporal]
    extends:
      service: dev
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    depends_on:
      smoke-worker:
        condition: service_healthy
    environment:
      TEMPORAL_TWO_BINARY_LIVE: "1"
      TEMPORAL_ADDRESS: http://temporal:7233
      TEMPORAL_NAMESPACE: temporal-sdk-test
      SMOKE_DRIVER_TIMEOUT_SECONDS: "${SMOKE_DRIVER_TIMEOUT_SECONDS:-300}"
      SMOKE_CACHE_EVICTION_TIMEOUT_SECONDS: "${SMOKE_CACHE_EVICTION_TIMEOUT_SECONDS:-900}"
      SMOKE_CACHE_EVICTION_FILE: /workspace/test/integration/temporal/.cache-eviction.json
      SMOKE_CACHE_EVICTION_READY_FILE: /workspace/test/integration/temporal/.cache-eviction-ready
      SMOKE_CACHE_EVICTION_SECOND_READY_FILE: /workspace/test/integration/temporal/.cache-eviction-second-ready
      SMOKE_REPLAY_DIAGNOSTICS_FILE: /workspace/test/integration/temporal/.restart-replay-diagnostics.json
    command:
      - timeout
      - --signal=TERM
      - --kill-after=10s
      - "${SMOKE_CACHE_EVICTION_TIMEOUT_SECONDS:-900}"
      - opam
      - exec
      - --
      - dune
      - exec
      - --build-dir=/workspace/_build/smoke-cache-eviction-driver
      - test/integration/temporal/driver/cache_eviction_driver.exe
    init: true

networks:
  temporal-network:
    driver: bridge

volumes:
  temporal-postgres-data:
