name: Build

on:
  # Keep the workflow trigger unconditional so the license audit runs for
  # documentation-only and other non-code pull requests as well.
  pull_request:

permissions:
  contents: read

concurrency:
  # A pull-request number remains stable across synchronize events, so a new
  # commit replaces an older queued or running PR run.
  group: build-${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changed code paths
    runs-on: ubuntu-24.04
    outputs:
      code: ${{ steps.changed-paths.outputs.code }}
      smoke: ${{ steps.changed-paths.outputs.smoke }}
      native_windows: ${{ steps.changed-paths.outputs.native_windows }}
    steps:
      - name: Check out pull-request head
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Classify changed paths
        id: changed-paths
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          code=false
          smoke=false
          native_windows=false

          while IFS= read -r path; do
            # JSON schemas are executable protocol contracts even though they
            # live beneath docs/. Validate them like code so an envelope shape
            # change cannot silently receive license-only verification.
            case "$path" in
              docs/schemas/*)
                code=true
                smoke=true
                ;;
              # Markdown and legal documentation retain the independent
              # license audit but do not spend a compatibility matrix.
              # Everything else fails closed into the normal code and
              # live-smoke gates so a new build input is not silently
              # license-only.
              *.md|*.markdown|LICENSE*|NOTICE*|docs/*)
                continue
                ;;
              # The live acceptance fixture is intentionally smoke-specific:
              # it exercises the complete Temporal/PostgreSQL topology but
              # does not alter the ordinary library source or build graph.
              test/integration/temporal/*)
                smoke=true
                continue
                ;;
              *)
                code=true
                smoke=true
                ;;
            esac

            # The macOS native link is the representative desktop gate for
            # every code PR. Windows is much slower, so run it before merge
            # when a change can affect the Rust/C bridge, native build graph,
            # or workflow configuration itself. The exhaustive
            # master/scheduled matrix always runs Windows regardless of this
            # classification.
            case "$path" in
              rust/*|lib/core_bridge/*|lib/sdk_supervisor/*|\
              lib/public/native_worker.*|lib/runtime/native_*|test/bridge/*|\
              *.c|*.h|Makefile|Dockerfile*|.dockerignore|dune|dune-project|\
              dune-workspace|*.opam|*.opam.locked|*/dune|scripts/*|\
              .github/workflows/*|.github/actions/*)
                native_windows=true
                ;;
            esac
          done < <(git diff --name-only "$BASE_SHA" "$HEAD_SHA")

          {
            echo "code=$code"
            echo "smoke=$smoke"
            echo "native_windows=$native_windows"
          } >> "$GITHUB_OUTPUT"

  quality:
    if: needs.changes.outputs.code == 'true'
    needs: changes
    name: Quality and security scans
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
      - name: Install pinned quality tools
        uses: taiki-e/install-action@2ca9b94c269419b7b0c711c09d0b21c4e1d51145 # v2.83.1
        with:
          tool: cargo-deny@0.20.2,cargo-machete@0.9.2,typos@1.48.0
          fallback: none
      - name: Check dependency security and repository quality
        run: make quality

  license-audit:
    name: Dependency license audit
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
      - name: Audit dependency licenses
        run: make license-check OCAML_VERSION=5.2
      - name: Test Cargo license policy
        run: |
          docker run --rm --network none \
            --volume "$PWD:/workspace:ro" \
            --workdir /workspace \
            python:3.14-slim-bookworm@sha256:4ff4b92a68355dbdb52584ab3391dff8d371a61d4e063468bfd0130e3189c6d9 \
            sh test/smoke/test_cargo_license_policy.sh
      - name: Audit locked Cargo dependency licenses
        shell: bash
        run: |
          set -o pipefail
          OCAML_IMAGE=ocaml/opam:debian-12-ocaml-5.2 \
            make --silent cargo-metadata \
            | docker run --rm --interactive --network none \
                --volume "$PWD:/workspace:ro" \
                --workdir /workspace \
                python:3.14-slim-bookworm@sha256:4ff4b92a68355dbdb52584ab3391dff8d371a61d4e063468bfd0130e3189c6d9 \
                python3 scripts/check-cargo-licenses.py --metadata -

  temporal-integration:
    if: needs.changes.outputs.smoke == 'true'
    needs: changes
    name: Temporal/PostgreSQL integration smoke (OCaml 5.5)
    runs-on: ubuntu-24.04
    # Six independent live controllers run sequentially while reusing the
    # checked-out source and build cache. Parent/child recovery includes a
    # deliberate 120-second timer and two complete worker generations.
    timeout-minutes: 45
    env:
      # Keep this as one explicit compatibility lane because it starts the
      # complete PostgreSQL/Temporal stack and two OCaml processes.
      OCAML_VERSION: "5.5"
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
      - name: Run the live two-OCaml-binary Temporal Compose smoke
        run: |
          make test-temporal-integration
          make test-temporal-worker-restart
          make test-temporal-worker-crash-recovery
          make test-temporal-worker-cache-eviction
          make test-temporal-workflow-patching
          make test-temporal-parent-child-restart
          make test-temporal-parent-child-failure-replay

  verify:
    if: needs.changes.outputs.code == 'true'
    needs: changes
    name: OCaml ${{ matrix.ocaml }} / ${{ matrix.runner }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        # PRs exercise the compatibility floor and current release on the
        # primary Linux architecture, plus the current release on ARM64.
        # build.yml retains the exhaustive 5.2–5.5 × amd64/arm64 matrix for
        # every master push and scheduled run.
        include:
          - ocaml: "5.2"
            runner: ubuntu-24.04
          - ocaml: "5.5"
            runner: ubuntu-24.04
          - ocaml: "5.5"
            runner: ubuntu-24.04-arm
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
      - name: Reclaim disposable GitHub-hosted runner disk
        # Linking the Rust static library into the OCaml test executables can
        # temporarily require more space than the preinstalled Android, .NET,
        # and Haskell toolchains leave on the amd64 hosted image. This guard
        # keeps the destructive cleanup confined to GitHub's disposable
        # runner; arm64 and any future self-hosted runners are left untouched.
        if: matrix.runner == 'ubuntu-24.04' && runner.environment == 'github-hosted'
        shell: bash
        run: |
          set -euo pipefail
          df -h /
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc /usr/local/.ghcup
          docker system prune --all --force --volumes
          df -h /
      - name: Build, lint, and test
        run: make verify OCAML_VERSION=${{ matrix.ocaml }}

  native-macos:
    if: needs.changes.outputs.code == 'true'
    needs: changes
    # macOS ARM64 provides a representative non-Linux native-link check for
    # every code PR. It is intentionally separate from the conditional
    # Windows job below so a normal PR does not wait for both desktop hosts.
    name: OCaml 5.5 / macOS ARM64
    runs-on: macos-15
    timeout-minutes: 45
    env:
      CARGO_TARGET_DIR: ${{ github.workspace }}/_build/rust
      RUSTUP_TOOLCHAIN: 1.94.1-aarch64-apple-darwin
      NATIVE_OCAML_VERSION: "5.5"
      NATIVE_RUST_VERSION: 1.94.1
      NATIVE_ARCH: arm64
      NATIVE_RUST_HOST: aarch64-apple-darwin
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
      - name: Set up OCaml 5.5
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: "5.5"
      - name: Set up pinned Rust toolchain
        shell: bash
        run: >-
          rustup toolchain install "$RUSTUP_TOOLCHAIN" --profile minimal
          --component clippy --component rustfmt
      - name: Install Protocol Buffers compiler on macOS
        run: brew install protobuf
      - name: Install OCaml dependencies
        run: opam install . --deps-only --with-test --yes
      - name: Build, lint, and test natively
        shell: bash
        run: make native-verify

  native-windows:
    # A Windows native build is required before merge when the cross-language
    # ABI, its build toolchain, or the workflow that invokes it changes. Pure
    # OCaml changes still receive Linux amd64/arm64 and macOS ARM validation;
    # master and scheduled runs retain unconditional Windows coverage.
    if: needs.changes.outputs.native_windows == 'true'
    needs: changes
    name: OCaml 5.5 / Windows x64
    runs-on: windows-latest
    timeout-minutes: 45
    env:
      CARGO_TARGET_DIR: ${{ github.workspace }}/_build/rust
      RUSTUP_TOOLCHAIN: 1.94.1-x86_64-pc-windows-gnu
      NATIVE_OCAML_VERSION: "5.5"
      NATIVE_RUST_VERSION: 1.94.1
      NATIVE_ARCH: amd64
      NATIVE_RUST_HOST: x86_64-pc-windows-gnu
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
      - name: Set up OCaml 5.5
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: "5.5"
          windows-compiler: mingw
          windows-environment: cygwin
      - name: Set up pinned Rust toolchain
        shell: bash
        run: >-
          rustup toolchain install "$RUSTUP_TOOLCHAIN" --profile minimal
          --component clippy --component rustfmt
      - name: Install Protocol Buffers compiler on Windows
        run: choco install protoc --no-progress --yes
      - name: Expose Protocol Buffers compiler to Cygwin
        shell: bash
        run: |
          set -euo pipefail
          # Chocolatey creates a Windows shim; Cygwin can execute it, but its
          # POSIX mode bits are not guaranteed to include an executable bit.
          protoc_unix_path="$(cygpath -u 'C:\ProgramData\chocolatey\bin\protoc.exe')"
          protoc_windows_path="$(cygpath -w "$protoc_unix_path")"
          test -f "$protoc_unix_path"
          cygpath -w "$(dirname "$protoc_unix_path")" >> "$GITHUB_PATH"
          echo "PROTOC=$protoc_windows_path" >> "$GITHUB_ENV"
          "$protoc_unix_path" --version
      - name: Install OCaml dependencies
        run: opam install . --deps-only --with-test --yes
      - name: Build, lint, and test natively
        shell: bash
        run: make native-verify
