name: Build

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: OCaml ${{ matrix.ocaml }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - ocaml: "5.2"
            service: dev
          - ocaml: "5.5"
            service: dev-current
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Build, lint, audit licenses, and test
        run: make verify SERVICE=${{ matrix.service }}
