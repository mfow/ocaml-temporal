name: Release preflight

on:
  pull_request:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-preflight-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  metadata-and-sbom:
    name: Release metadata and Cargo SBOM
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Check release metadata and source inputs
        run: make release-preflight

      - name: Generate deterministic Cargo SBOM
        shell: bash
        run: |
          set -euo pipefail
          cargo metadata --manifest-path rust/Cargo.toml --locked --format-version 1 \
            > "$RUNNER_TEMP/cargo-metadata.json"
          docker run --rm --network none \
            --volume "$PWD:/workspace:ro" \
            --volume "$RUNNER_TEMP/cargo-metadata.json:/tmp/cargo-metadata.json:ro" \
            --workdir /workspace \
            python:3.14-slim-bookworm@sha256:4ff4b92a68355dbdb52584ab3391dff8d371a61d4e063468bfd0130e3189c6d9 \
            python3 scripts/generate-cargo-sbom.py --metadata /tmp/cargo-metadata.json \
            > "$RUNNER_TEMP/ocaml-temporal-cargo.spdx.json"
          test -s "$RUNNER_TEMP/ocaml-temporal-cargo.spdx.json"

      - name: Audit generated SBOM
        shell: bash
        run: |
          set -euo pipefail
          docker run --rm --network none \
            --volume "$PWD:/workspace:ro" \
            --volume "$RUNNER_TEMP/ocaml-temporal-cargo.spdx.json:/tmp/ocaml-temporal-cargo.spdx.json:ro" \
            --workdir /workspace \
            python:3.14-slim-bookworm@sha256:4ff4b92a68355dbdb52584ab3391dff8d371a61d4e063468bfd0130e3189c6d9 \
            python3 scripts/generate-cargo-sbom.py --audit /tmp/ocaml-temporal-cargo.spdx.json
