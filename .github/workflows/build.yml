name: Build

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality and security scans
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
      - name: Install pinned quality tools
        uses: taiki-e/install-action@2ca9b94c269419b7b0c711c09d0b21c4e1d51145 # v2.83.1
        with:
          tool: cargo-deny@0.20.2,cargo-machete@0.9.2,typos@1.48.0
          fallback: none
      - name: Check dependency security and repository quality
        run: make quality

  license-audit:
    name: Dependency license audit
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
      - name: Audit dependency licenses
        run: make license-check OCAML_VERSION=5.2
      - name: Test Cargo license policy
        run: |
          docker run --rm --network none \
            --volume "$PWD:/workspace:ro" \
            --workdir /workspace \
            python:3.14-slim-bookworm@sha256:4ff4b92a68355dbdb52584ab3391dff8d371a61d4e063468bfd0130e3189c6d9 \
            sh test/smoke/test_cargo_license_policy.sh
      - name: Audit locked Cargo dependency licenses
        shell: bash
        run: |
          set -o pipefail
          OCAML_IMAGE=ocaml/opam:debian-12-ocaml-5.2 \
            make --silent cargo-metadata \
            | docker run --rm --interactive --network none \
                --volume "$PWD:/workspace:ro" \
                --workdir /workspace \
                python:3.14-slim-bookworm@sha256:4ff4b92a68355dbdb52584ab3391dff8d371a61d4e063468bfd0130e3189c6d9 \
                python3 scripts/check-cargo-licenses.py --metadata -

  temporal-integration:
    name: Temporal/PostgreSQL integration smoke (OCaml 5.5)
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    env:
      # Keep this as one explicit compatibility lane. The same job will build
      # the OCaml client and worker when the live workflow test is added.
      OCAML_VERSION: "5.5"
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
      - name: Run the real Temporal Compose smoke
        run: make test-temporal-integration

  verify:
    name: OCaml ${{ matrix.ocaml }} / ${{ matrix.runner }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        ocaml:
          - "5.2"
          - "5.3"
          - "5.4"
          - "5.5"
        runner:
          - ubuntu-24.04
          - ubuntu-24.04-arm
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
      - name: Build, lint, and test
        run: make verify OCAML_VERSION=${{ matrix.ocaml }}

  native:
    name: OCaml 5.5 / ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Windows x64
            runner: windows-latest
            architecture: amd64
            rust-host: x86_64-pc-windows-gnu
            rust-toolchain: 1.94.1-x86_64-pc-windows-gnu
          - label: macOS ARM64
            runner: macos-15
            architecture: arm64
            rust-host: aarch64-apple-darwin
            rust-toolchain: 1.94.1-aarch64-apple-darwin
    env:
      CARGO_TARGET_DIR: ${{ github.workspace }}/_build/rust
      RUSTUP_TOOLCHAIN: ${{ matrix.rust-toolchain }}
      NATIVE_OCAML_VERSION: "5.5"
      NATIVE_RUST_VERSION: 1.94.1
      NATIVE_ARCH: ${{ matrix.architecture }}
      NATIVE_RUST_HOST: ${{ matrix.rust-host }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
      - name: Set up OCaml 5.5
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: "5.5"
          windows-compiler: mingw
          windows-environment: cygwin
      - name: Set up pinned Rust toolchain
        shell: bash
        run: >-
          rustup toolchain install "$RUSTUP_TOOLCHAIN" --profile minimal
          --component clippy --component rustfmt
      - name: Install Protocol Buffers compiler on macOS
        if: runner.os == 'macOS'
        run: brew install protobuf
      - name: Install Protocol Buffers compiler on Windows
        if: runner.os == 'Windows'
        run: choco install protoc --no-progress --yes
      - name: Install OCaml dependencies
        run: opam install . --deps-only --with-test --yes
      - name: Build, lint, and test natively
        shell: bash
        run: make native-verify
