name: Build

on:
  # Keep the workflow trigger unconditional so the license audit runs for
  # documentation-only and other non-code pull requests as well.
  pull_request:

permissions:
  contents: read

concurrency:
  # A pull-request number remains stable across synchronize events, so a new
  # commit replaces an older queued or running PR run.
  group: build-${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changed code paths
    runs-on: ubuntu-24.04
    outputs:
      code: ${{ steps.changed-paths.outputs.code }}
      smoke: ${{ steps.changed-paths.outputs.smoke }}
    steps:
      - name: Check out pull-request head
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Classify changed paths
        id: changed-paths
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          code=false
          smoke=false

          while IFS= read -r path; do
            # The live Temporal/PostgreSQL acceptance fixture is the only
            # smoke-specific path. Its changes must not enable the ordinary
            # build matrix, but they must enable the smoke job.
            if [[ "$path" == test/integration/temporal/* ]]; then
              smoke=true
              continue
            fi

            # OCaml, native bridge, and Rust source changes enable all PR
            # builds. Rust manifests and OCaml library build files are also
            # included by their source trees because they change those builds.
            case "$path" in
              *.ml|*.mli|*.mll|*.mly|*.re|*.rei|*.c|*.h|*.rs|lib/*|rust/*)
                code=true
                smoke=true
                ;;
            esac
          done < <(git diff --name-only "$BASE_SHA" "$HEAD_SHA")

          {
            echo "code=$code"
            echo "smoke=$smoke"
          } >> "$GITHUB_OUTPUT"

  quality:
    if: needs.changes.outputs.code == 'true'
    needs: changes
    name: Quality and security scans
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
      - name: Install pinned quality tools
        uses: taiki-e/install-action@2ca9b94c269419b7b0c711c09d0b21c4e1d51145 # v2.83.1
        with:
          tool: cargo-deny@0.20.2,cargo-machete@0.9.2,typos@1.48.0
          fallback: none
      - name: Check dependency security and repository quality
        run: make quality

  license-audit:
    name: Dependency license audit
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
      - name: Audit dependency licenses
        run: make license-check OCAML_VERSION=5.2
      - name: Test Cargo license policy
        run: |
          docker run --rm --network none \
            --volume "$PWD:/workspace:ro" \
            --workdir /workspace \
            python:3.14-slim-bookworm@sha256:4ff4b92a68355dbdb52584ab3391dff8d371a61d4e063468bfd0130e3189c6d9 \
            sh test/smoke/test_cargo_license_policy.sh
      - name: Audit locked Cargo dependency licenses
        shell: bash
        run: |
          set -o pipefail
          OCAML_IMAGE=ocaml/opam:debian-12-ocaml-5.2 \
            make --silent cargo-metadata \
            | docker run --rm --interactive --network none \
                --volume "$PWD:/workspace:ro" \
                --workdir /workspace \
                python:3.14-slim-bookworm@sha256:4ff4b92a68355dbdb52584ab3391dff8d371a61d4e063468bfd0130e3189c6d9 \
                python3 scripts/check-cargo-licenses.py --metadata -

  temporal-integration:
    if: needs.changes.outputs.smoke == 'true'
    needs: changes
    name: Temporal/PostgreSQL integration smoke (OCaml 5.5)
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      # Keep this as one explicit compatibility lane because it starts the
      # complete PostgreSQL/Temporal stack and two OCaml processes.
      OCAML_VERSION: "5.5"
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
      - name: Run the live two-OCaml-binary Temporal Compose smoke
        run: make test-temporal-integration

  verify:
    if: needs.changes.outputs.code == 'true'
    needs: changes
    name: OCaml ${{ matrix.ocaml }} / ${{ matrix.runner }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        ocaml:
          - "5.2"
          - "5.3"
          - "5.4"
          - "5.5"
        runner:
          - ubuntu-24.04
          - ubuntu-24.04-arm
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
      - name: Build, lint, and test
        run: make verify OCAML_VERSION=${{ matrix.ocaml }}

  native:
    if: needs.changes.outputs.code == 'true'
    needs: changes
    name: OCaml 5.5 / ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Windows x64
            runner: windows-latest
            architecture: amd64
            rust-host: x86_64-pc-windows-gnu
            rust-toolchain: 1.94.1-x86_64-pc-windows-gnu
          - label: macOS ARM64
            runner: macos-15
            architecture: arm64
            rust-host: aarch64-apple-darwin
            rust-toolchain: 1.94.1-aarch64-apple-darwin
    env:
      CARGO_TARGET_DIR: ${{ github.workspace }}/_build/rust
      RUSTUP_TOOLCHAIN: ${{ matrix.rust-toolchain }}
      NATIVE_OCAML_VERSION: "5.5"
      NATIVE_RUST_VERSION: 1.94.1
      NATIVE_ARCH: ${{ matrix.architecture }}
      NATIVE_RUST_HOST: ${{ matrix.rust-host }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
      - name: Set up OCaml 5.5
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: "5.5"
          windows-compiler: mingw
          windows-environment: cygwin
      - name: Set up pinned Rust toolchain
        shell: bash
        run: >-
          rustup toolchain install "$RUSTUP_TOOLCHAIN" --profile minimal
          --component clippy --component rustfmt
      - name: Install Protocol Buffers compiler on macOS
        if: runner.os == 'macOS'
        run: brew install protobuf
      - name: Install Protocol Buffers compiler on Windows
        if: runner.os == 'Windows'
        run: choco install protoc --no-progress --yes
      - name: Expose Protocol Buffers compiler to Cygwin
        if: runner.os == 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          # Chocolatey creates a Windows shim; Cygwin can execute it, but its
          # POSIX mode bits are not guaranteed to include an executable bit.
          protoc_unix_path="$(cygpath -u 'C:\ProgramData\chocolatey\bin\protoc.exe')"
          protoc_windows_path="$(cygpath -w "$protoc_unix_path")"
          test -f "$protoc_unix_path"
          cygpath -w "$(dirname "$protoc_unix_path")" >> "$GITHUB_PATH"
          echo "PROTOC=$protoc_windows_path" >> "$GITHUB_ENV"
          "$protoc_unix_path" --version
      - name: Install OCaml dependencies
        run: opam install . --deps-only --with-test --yes
      - name: Build, lint, and test natively
        shell: bash
        run: make native-verify
